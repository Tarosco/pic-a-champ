 <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Race Coast Sales Window</title>
  <style>
    :root {
      --bg:#f4f6fa; --card:#fff; --text:#1f2937; --muted:#667085; --line:#d9e1ec;
      --accent:#0f3d75; --soft:#eef3fb; --yes:#138a3d; --no:#b42318;
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; font-family:Arial,Helvetica,sans-serif; background:var(--bg); color:var(--text); }
    header {
      position:sticky; top:0; z-index:30; background:rgba(15,61,117,.96); backdrop-filter:blur(8px);
      color:#fff; padding:8px 10px; box-shadow:0 2px 8px rgba(0,0,0,.12);
    }
    .topbar { display:grid; grid-template-columns:minmax(0,1fr) auto auto auto; gap:8px; align-items:center; }
    .search { width:100%; min-width:0; border:none; border-radius:12px; padding:10px 12px; font-size:14px; }
    .iconbtn,.segbtn,.smallbtn,.togglebtn,.pm,.actionbtn,.modebtn,.vendorbtn,.slidebtn {
      border:none; cursor:pointer; font-weight:700; font-size:13px; border-radius:10px;
    }
    .iconbtn { background:#fff; color:var(--accent); padding:10px 11px; min-width:42px; }
    .subbar { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .segbtn, .modebtn { background:#ffffff22; color:#fff; padding:7px 10px; }
    .segbtn.active, .modebtn.active { background:#fff; color:var(--accent); }
    main { max-width:1480px; margin:0 auto; padding:10px; }
    .summary { color:var(--muted); font-size:13px; margin:2px 2px 10px; display:flex; justify-content:space-between; flex-wrap:wrap; gap:8px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:16px; overflow:hidden; box-shadow:0 8px 20px rgba(0,0,0,.05); }
    .media { aspect-ratio:4/3; background:#e9eef5; overflow:hidden; }
    .media img { width:100%; height:100%; object-fit:cover; display:block; }
    .imgfallback { height:100%; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:12px; padding:14px; text-align:center; }
    .body { padding:8px 10px 10px; }
    .metaTop { font-size:11px; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.35px; }
    .nameRow { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; margin-top:3px; }
    .name { font-size:16px; font-weight:700; line-height:1.1; }
    .sex { font-size:10px; color:var(--muted); background:var(--soft); border-radius:999px; padding:4px 7px; white-space:nowrap; }
    .pedline { font-size:12px; margin-top:3px; color:#344054; }
    .controlRow { display:flex; align-items:center; justify-content:space-between; gap:8px; margin-top:8px; flex-wrap:wrap; }
    .togglebtn { min-width:58px; padding:7px 10px; }
    .togglebtn.no { background:#f8fafc; color:var(--muted); border:1px solid var(--line); }
    .togglebtn.yes { background:#e7f7ec; color:var(--yes); border:1px solid #cfead8; }
    .scoreWrap { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .scoreMini { display:flex; align-items:center; gap:4px; }
    .scoreLabel { font-size:11px; color:var(--muted); font-weight:700; }
    .pm { width:24px; height:24px; border-radius:999px; background:#f8fafc; color:var(--accent); border:1px solid var(--line); padding:0; }
    .scoreVal { min-width:14px; text-align:center; font-size:13px; font-weight:700; }
    .total { font-size:11px; color:var(--muted); font-weight:700; background:#f8fafc; border:1px solid var(--line); border-radius:999px; padding:5px 8px; }
    .actions { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
    .actionbtn { padding:7px 10px; background:#f8fafc; color:var(--accent); border:1px solid var(--line); }
    .notes { margin-top:6px; font-size:11px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    dialog { width:min(420px, calc(100vw - 18px)); border:none; border-radius:18px; padding:0; box-shadow:0 24px 70px rgba(0,0,0,.28); }
    dialog::backdrop { background:rgba(15,23,42,.45); }
    .drawer { width:min(360px, calc(100vw - 18px)); margin-left:auto; max-height:calc(100vh - 12px); overflow:auto; }
    .modalhead { padding:14px 16px; background:var(--accent); color:#fff; font-size:18px; font-weight:700; }
    .modalbody { padding:14px 16px 16px; }
    .field { margin-bottom:12px; }
    .field label { display:block; margin-bottom:6px; font-size:12px; color:var(--muted); font-weight:700; }
    .field input,.field select,.field textarea { width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 11px; font-size:14px; }
    .modalactions { display:flex; justify-content:space-between; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .smallbtn { padding:10px 12px; }
    .primary { background:var(--accent); color:#fff; }
    .muted { background:#f7f9fc; color:var(--accent); border:1px solid var(--line); }
    .danger { background:#fdecec; color:var(--no); }

    #lightbox { width:min(98vw, 1200px); max-height:96vh; background:#000; }
    #lightbox .wrap { position:relative; }
    #lightbox img { width:100%; height:auto; max-height:90vh; object-fit:contain; display:block; }
    #lightboxClose { position:absolute; top:10px; right:10px; background:rgba(255,255,255,.9); color:#000; border:none; border-radius:999px; width:36px; height:36px; font-weight:700; }

    #vendorYardDialog, #top20Dialog { width:min(720px, calc(100vw - 18px)); }
    .vendorGrid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:8px; }
    .vendorbtn { background:#f8fafc; color:var(--accent); border:1px solid var(--line); padding:10px 12px; text-align:left; }

    #slideshowDialog {
      width:min(98vw, 1100px);
      max-height:96vh;
      background:#111827;
      color:#fff;
    }
    .slideWrap { padding:12px; }
    .slideTop { display:flex; justify-content:space-between; gap:8px; align-items:center; margin-bottom:10px; }
    .slideMeta { font-size:14px; color:#d1d5db; }
    .slideImgWrap {
      background:#000; border-radius:14px; overflow:hidden; display:flex; align-items:center; justify-content:center;
      max-height:68vh;
    }
    .slideImgWrap img { width:100%; height:auto; max-height:68vh; object-fit:contain; display:block; }
    .slideInfo { margin-top:10px; }
    .slideName { font-size:20px; font-weight:700; }
    .slidePed { font-size:14px; color:#d1d5db; margin-top:4px; }
    .slideScores { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .slideChip {
      background:#1f2937; border:1px solid #374151; border-radius:999px; padding:7px 10px; font-size:13px;
    }
    .slideControls { display:flex; justify-content:space-between; gap:8px; margin-top:12px; flex-wrap:wrap; }
    .slidebtn { background:#f8fafc; color:var(--accent); border:1px solid var(--line); padding:10px 14px; }

    @media (max-width:760px) {
      .topbar { grid-template-columns:minmax(0,1fr) auto auto; }
      .hideMobile { display:none; }
      .grid { grid-template-columns:1fr; gap:10px; }
      main { padding:8px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <input id="search" class="search" type="text" placeholder="Search" />
      <button id="openFiltersBtn" class="iconbtn" type="button">☰</button>
      <button id="shortlistBtn" class="iconbtn" type="button">✓</button>
      <button id="allLotsBtn" class="iconbtn hideMobile" type="button">All</button>
    </div>
    <div class="subbar">
      <button id="rankTotalBtn" class="segbtn" type="button">T</button>
      <button id="rankPhysicalBtn" class="segbtn" type="button">P</button>
      <button id="rankPedigreeBtn" class="segbtn" type="button">G</button>
      <button id="vendorYardBtn" class="modebtn" type="button">Yard</button>
      <button id="top20Btn" class="modebtn" type="button">Top20</button>
      <button id="slideshowBtn" class="modebtn" type="button">Show</button>
      <button id="exportBtn" class="segbtn" type="button">⇩</button>
      <button id="importBtn" class="segbtn" type="button">⇧</button>
      <input id="importFile" type="file" accept="application/json" hidden />
    </div>
  </header>

  <main>
    <div id="summary" class="summary"></div>
    <div id="grid" class="grid"></div>
  </main>

  <dialog id="filtersDialog" class="drawer">
    <div class="modalhead">Filters</div>
    <div class="modalbody">
      <div class="field">
        <label for="vendorFilter">Vendor</label>
        <select id="vendorFilter"><option value="">All vendors</option></select>
      </div>
      <div class="field">
        <label for="choiceFilter">Choice</label>
        <select id="choiceFilter">
          <option value="">All</option>
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select>
      </div>
      <div class="field">
        <label for="pickedFilter">Updated</label>
        <select id="pickedFilter">
          <option value="">All lots</option>
          <option value="picked">Updated only</option>
        </select>
      </div>
      <div class="field">
        <label for="sortBy">Sort</label>
        <select id="sortBy">
          <option value="lot">Lot</option>
          <option value="physical">Physical</option>
          <option value="pedigree">Pedigree</option>
          <option value="total">Total</option>
        </select>
      </div>
      <div class="field">
        <label for="sortDir">Order</label>
        <select id="sortDir">
          <option value="asc">Low first</option>
          <option value="desc">High first</option>
        </select>
      </div>
      <div class="modalactions">
        <button id="closeFiltersBtn" class="smallbtn muted" type="button">Close</button>
        <button id="clearFiltersBtn" class="smallbtn muted" type="button">Clear</button>
      </div>
    </div>
  </dialog>

  <dialog id="adminDialog">
    <div class="modalhead" id="modalTitle">Admin</div>
    <div class="modalbody">
      <div id="modalSub" style="font-size:12px;color:var(--muted);margin-bottom:12px;"></div>
      <div class="field">
        <label for="secondLink">Second link</label>
        <input id="secondLink" type="url" placeholder="https://..." />
      </div>
      <div class="field">
        <label for="notes">Notes</label>
        <textarea id="notes" rows="4" placeholder="Notes..."></textarea>
      </div>
      <div class="modalactions">
        <button id="deleteEntryBtn" class="smallbtn danger" type="button">Clear</button>
        <div style="display:flex;gap:8px;">
          <button id="cancelBtn" class="smallbtn muted" type="button">Cancel</button>
          <button id="saveBtn" class="smallbtn primary" type="button">Save</button>
        </div>
      </div>
    </div>
  </dialog>

  <dialog id="vendorYardDialog">
    <div class="modalhead">Vendor Yard</div>
    <div class="modalbody">
      <div class="vendorGrid" id="vendorGrid"></div>
      <div class="modalactions">
        <button id="vendorYardCloseBtn" class="smallbtn muted" type="button">Close</button>
      </div>
    </div>
  </dialog>

  <dialog id="top20Dialog">
    <div class="modalhead">Top 20</div>
    <div class="modalbody">
      <div id="top20Grid" class="grid"></div>
      <div class="modalactions">
        <button id="top20CloseBtn" class="smallbtn muted" type="button">Close</button>
      </div>
    </div>
  </dialog>

  <dialog id="slideshowDialog">
    <div class="slideWrap">
      <div class="slideTop">
        <div>
          <div id="slideLot" style="font-size:18px;font-weight:700;"></div>
          <div id="slideVendor" class="slideMeta"></div>
        </div>
        <button id="slideshowCloseBtn" class="smallbtn muted" type="button">Close</button>
      </div>
      <div class="slideImgWrap">
        <img id="slideImg" alt="Shortlist horse" />
      </div>
      <div class="slideInfo">
        <div id="slideName" class="slideName"></div>
        <div id="slidePed" class="slidePed"></div>
        <div class="slideScores">
          <div id="slideChoice" class="slideChip"></div>
          <div id="slideP" class="slideChip"></div>
          <div id="slideG" class="slideChip"></div>
          <div id="slideT" class="slideChip"></div>
        </div>
      </div>
      <div class="slideControls">
        <button id="slidePrevBtn" class="slidebtn" type="button">Prev</button>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button id="slidePicBtn" class="slidebtn" type="button">Pic</button>
          <button id="slidePedBtn" class="slidebtn" type="button">Ped</button>
        </div>
        <button id="slideNextBtn" class="slidebtn" type="button">Next</button>
      </div>
    </div>
  </dialog>

  <dialog id="lightbox">
    <div class="wrap">
      <button id="lightboxClose" type="button">×</button>
      <img id="lightboxImg" alt="Lot photo" />
    </div>
  </dialog>

  <script>
    const BASE = 'https://racecoastsales.co.za/wp-content/uploads/2026-PYS';
    const STORAGE_KEY = 'racecoast-sales-window-v6';
    const lots = [
      /* paste your correct lot objects here */
    ];

    let edits = loadEdits();
    let currentLot = null;
    let slideshowRecords = [];
    let slideshowIndex = 0;

    const grid = document.getElementById('grid');
    const summary = document.getElementById('summary');
    const search = document.getElementById('search');
    const openFiltersBtn = document.getElementById('openFiltersBtn');
    const filtersDialog = document.getElementById('filtersDialog');
    const closeFiltersBtn = document.getElementById('closeFiltersBtn');
    const vendorFilter = document.getElementById('vendorFilter');
    const choiceFilter = document.getElementById('choiceFilter');
    const pickedFilter = document.getElementById('pickedFilter');
    const sortBy = document.getElementById('sortBy');
    const sortDir = document.getElementById('sortDir');
    const clearFiltersBtn = document.getElementById('clearFiltersBtn');
    const shortlistBtn = document.getElementById('shortlistBtn');
    const allLotsBtn = document.getElementById('allLotsBtn');
    const rankTotalBtn = document.getElementById('rankTotalBtn');
    const rankPhysicalBtn = document.getElementById('rankPhysicalBtn');
    const rankPedigreeBtn = document.getElementById('rankPedigreeBtn');
    const vendorYardBtn = document.getElementById('vendorYardBtn');
    const top20Btn = document.getElementById('top20Btn');
    const slideshowBtn = document.getElementById('slideshowBtn');
    const exportBtn = document.getElementById('exportBtn');
    const importBtn = document.getElementById('importBtn');
    const importFile = document.getElementById('importFile');

    const adminDialog = document.getElementById('adminDialog');
    const modalTitle = document.getElementById('modalTitle');
    const modalSub = document.getElementById('modalSub');
    const secondLink = document.getElementById('secondLink');
    const notes = document.getElementById('notes');
    const saveBtn = document.getElementById('saveBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const deleteEntryBtn = document.getElementById('deleteEntryBtn');

    const vendorYardDialog = document.getElementById('vendorYardDialog');
    const vendorGrid = document.getElementById('vendorGrid');
    const vendorYardCloseBtn = document.getElementById('vendorYardCloseBtn');

    const top20Dialog = document.getElementById('top20Dialog');
    const top20Grid = document.getElementById('top20Grid');
    const top20CloseBtn = document.getElementById('top20CloseBtn');

    const slideshowDialog = document.getElementById('slideshowDialog');
    const slideshowCloseBtn = document.getElementById('slideshowCloseBtn');
    const slideLot = document.getElementById('slideLot');
    const slideVendor = document.getElementById('slideVendor');
    const slideImg = document.getElementById('slideImg');
    const slideName = document.getElementById('slideName');
    const slidePed = document.getElementById('slidePed');
    const slideChoice = document.getElementById('slideChoice');
    const slideP = document.getElementById('slideP');
    const slideG = document.getElementById('slideG');
    const slideT = document.getElementById('slideT');
    const slidePrevBtn = document.getElementById('slidePrevBtn');
    const slideNextBtn = document.getElementById('slideNextBtn');
    const slidePicBtn = document.getElementById('slidePicBtn');
    const slidePedBtn = document.getElementById('slidePedBtn');

    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxClose = document.getElementById('lightboxClose');

    function normalizeVendor(vendor) {
      return String(vendor || '')
        .replace(/\s*\(AS AGENT\)\s*/gi, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function normalizeLots(rawLots) {
      return rawLots.map(item => ({
        ...item,
        vendor: normalizeVendor(item.vendor)
      }));
    }

    const cleanLots = normalizeLots(lots);

    function loadEdits(){ try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch { return {}; } }
    function saveEdits(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(edits)); }
    function getEdit(lot){ return edits[String(lot)] || {}; }
    function totalScore(entry){ return Number(entry.physicalScore ?? 3) + Number(entry.pedigreeScore ?? 3); }
    function isPicked(entry){ return Boolean(entry.choice === 'yes' || entry.physicalScore !== undefined || entry.pedigreeScore !== undefined || entry.notes || entry.secondLink); }
    function lotImage(lot){ return `${BASE}/2026-PYS-${lot}.jpg`; }
    function lotPedigree(lot){ return `${BASE}/2026-PYS-${lot}.pdf`; }
    function escapeHtml(str){ return String(str ?? '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;'); }

    function populateVendorFilter(){
      const vendors = [...new Set(cleanLots.map(x => x.vendor).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
      vendorFilter.innerHTML = '<option value="">All vendors</option>';
      vendors.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v;
        opt.textContent = v;
        vendorFilter.appendChild(opt);
      });
    }

    function populateVendorYard(){
      const vendors = [...new Set(cleanLots.map(x => x.vendor).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
      vendorGrid.innerHTML = '';
      vendors.forEach(vendor => {
        const btn = document.createElement('button');
        btn.className = 'vendorbtn';
        btn.type = 'button';
        btn.textContent = vendor;
        btn.onclick = () => {
          vendorFilter.value = vendor;
          vendorYardDialog.close();
          render();
        };
        vendorGrid.appendChild(btn);
      });
    }

    function mergedRecord(base){
      const e = getEdit(base.lot);
      return {
        ...base,
        choice: e.choice || 'no',
        physicalScore: e.physicalScore === undefined ? 3 : Number(e.physicalScore),
        pedigreeScore: e.pedigreeScore === undefined ? 3 : Number(e.pedigreeScore),
        secondLink: e.secondLink || '',
        notes: e.notes || '',
        total: totalScore(e)
      };
    }

    function compareValues(a,b,key,dir){
      let av, bv;
      if (key === 'physical') { av = Number(a.physicalScore); bv = Number(b.physicalScore); }
      else if (key === 'pedigree') { av = Number(a.pedigreeScore); bv = Number(b.pedigreeScore); }
      else if (key === 'total') { av = Number(a.total); bv = Number(b.total); }
      else { av = Number(a.lot); bv = Number(b.lot); }
      const res = av === bv ? Number(a.lot) - Number(b.lot) : av - bv;
      return dir === 'asc' ? res : -res;
    }

    function filteredData(){
      const q = search.value.trim().toLowerCase();
      const selectedVendor = vendorFilter.value;
      const selectedChoice = choiceFilter.value;
      const pickedMode = pickedFilter.value;
      return cleanLots.map(mergedRecord).filter(r => {
        const hay = `${r.lot} ${r.name} ${r.sire} ${r.dam} ${r.vendor}`.toLowerCase();
        return (!q || hay.includes(q))
          && (!selectedVendor || r.vendor === selectedVendor)
          && (!selectedChoice || r.choice === selectedChoice)
          && (pickedMode !== 'picked' || isPicked(getEdit(r.lot)));
      }).sort((a,b)=>compareValues(a,b,sortBy.value,sortDir.value));
    }

    function top20Data() {
      return cleanLots
        .map(mergedRecord)
        .filter(r => isPicked(getEdit(r.lot)))
        .sort((a,b)=>compareValues(a,b,'total','desc'))
        .slice(0,20);
    }

    function shortlistData() {
      return cleanLots
        .map(mergedRecord)
        .filter(r => r.choice === 'yes')
        .sort((a,b)=>compareValues(a,b,'total','desc'));
    }

    function setRankButtons(){
      [rankTotalBtn, rankPhysicalBtn, rankPedigreeBtn].forEach(b => b.classList.remove('active'));
      if (sortBy.value === 'total') rankTotalBtn.classList.add('active');
      if (sortBy.value === 'physical') rankPhysicalBtn.classList.add('active');
      if (sortBy.value === 'pedigree') rankPedigreeBtn.classList.add('active');
    }

    function renderCards(records, targetEl) {
      targetEl.innerHTML = '';
      records.forEach(record => {
        const toggleClass = record.choice === 'yes' ? 'yes' : 'no';
        const notesBlock = record.notes ? `<div class="notes">${escapeHtml(record.notes)}</div>` : '';
        const secondBtn = record.secondLink ? `<button class="actionbtn" type="button" data-openlink="${record.lot}">L2</button>` : '';
        const card = document.createElement('article');
        card.className = 'card';
        card.innerHTML = `
          <div class="media">
            <img src="${lotImage(record.lot)}" alt="Lot ${record.lot}" loading="lazy" data-lightbox="${record.lot}" onerror="this.style.display='none';this.parentElement.innerHTML='<div class=\\'imgfallback\\'>No image found for Lot ${record.lot}</div>'">
          </div>
          <div class="body">
            <div class="metaTop">LOT ${record.lot} · ${escapeHtml(record.vendor)}</div>
            <div class="nameRow">
              <div class="name">${escapeHtml(record.name)}</div>
              <div class="sex">${escapeHtml(record.sex || '')}</div>
            </div>
            <div class="pedline">${escapeHtml(record.sire)} – ${escapeHtml(record.dam)}</div>
            <div class="controlRow">
              <button class="togglebtn ${toggleClass}" type="button" data-toggle="${record.lot}">${record.choice === 'yes' ? 'YES' : 'NO'}</button>
              <div class="scoreWrap">
                <div class="scoreMini">
                  <span class="scoreLabel">P</span>
                  <button class="pm" type="button" data-step="-1" data-kind="physical" data-lot="${record.lot}">−</button>
                  <span class="scoreVal">${record.physicalScore}</span>
                  <button class="pm" type="button" data-step="1" data-kind="physical" data-lot="${record.lot}">+</button>
                </div>
                <div class="scoreMini">
                  <span class="scoreLabel">G</span>
                  <button class="pm" type="button" data-step="-1" data-kind="pedigree" data-lot="${record.lot}">−</button>
                  <span class="scoreVal">${record.pedigreeScore}</span>
                  <button class="pm" type="button" data-step="1" data-kind="pedigree" data-lot="${record.lot}">+</button>
                </div>
                <div class="total">T ${record.total}</div>
              </div>
            </div>
            <div class="actions">
              <button class="actionbtn" type="button" data-photo="${record.lot}">Pic</button>
              <button class="actionbtn" type="button" data-pdf="${record.lot}">Ped</button>
              ${secondBtn}
              <button class="actionbtn" type="button" data-admin="${record.lot}">⋯</button>
            </div>
            ${notesBlock}
          </div>`;
        targetEl.appendChild(card);
      });
    }

    function render(){
      const records = filteredData();
      const yesCount = Object.values(edits).filter(e => e.choice === 'yes').length;
      const pickedCount = Object.values(edits).filter(isPicked).length;
      summary.innerHTML = `<div>${records.length} shown</div><div>${pickedCount} updated • ${yesCount} yes</div>`;
      setRankButtons();
      renderCards(records, grid);
      bindActions();
    }

    function toggleChoice(lot){
      const e = getEdit(lot);
      const next = e.choice === 'yes' ? 'no' : 'yes';
      edits[String(lot)] = { ...e, choice: next };
      saveEdits();
      render();
      if (slideshowDialog.open) updateSlideshow();
    }

    function stepScore(lot, kind, step){
      const e = getEdit(lot);
      const key = kind + 'Score';
      const current = e[key] === undefined ? 3 : Number(e[key]);
      const next = Math.max(1, Math.min(5, current + Number(step)));
      edits[String(lot)] = { ...e, [key]: next };
      saveEdits();
      render();
      if (slideshowDialog.open) updateSlideshow();
    }

    function openAdmin(lot){
      currentLot = lot;
      const base = cleanLots.find(x => x.lot === lot);
      const e = getEdit(lot);
      modalTitle.textContent = `Lot ${lot} — ${base.name}`;
      modalSub.textContent = `${base.sire} – ${base.dam}`;
      secondLink.value = e.secondLink || '';
      notes.value = e.notes || '';
      adminDialog.showModal();
    }

    function saveAdmin(){
      if (currentLot == null) return;
      const e = getEdit(currentLot);
      edits[String(currentLot)] = { ...e, secondLink: secondLink.value.trim(), notes: notes.value.trim() };
      saveEdits();
      adminDialog.close();
      render();
      if (slideshowDialog.open) updateSlideshow();
    }

    function clearAdmin(){
      if (currentLot == null) return;
      delete edits[String(currentLot)];
      saveEdits();
      adminDialog.close();
      render();
      if (slideshowDialog.open) updateSlideshow();
    }

    function exportData(){
      const blob = new Blob([JSON.stringify(edits,null,2)], { type:'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'racecoast-sales-window-updates.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importData(file){
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          edits = parsed && typeof parsed === 'object' ? parsed : {};
          saveEdits();
          render();
        } catch {
          alert('Could not import that file.');
        }
      };
      reader.readAsText(file);
    }

    function openLightbox(lot){
      lightboxImg.src = lotImage(lot);
      lightbox.showModal();
    }

    function openTop20() {
      const data = top20Data();
      renderCards(data, top20Grid);
      top20Dialog.showModal();
      bindActions();
    }

    function openSlideshow() {
      slideshowRecords = shortlistData();
      if (!slideshowRecords.length) {
        alert('No YES horses in shortlist yet.');
        return;
      }
      slideshowIndex = 0;
      updateSlideshow();
      slideshowDialog.showModal();
    }

    function updateSlideshow() {
      slideshowRecords = shortlistData();
      if (!slideshowRecords.length) {
        slideshowDialog.close();
        return;
      }
      if (slideshowIndex >= slideshowRecords.length) slideshowIndex = slideshowRecords.length - 1;
      if (slideshowIndex < 0) slideshowIndex = 0;

      const record = slideshowRecords[slideshowIndex];
      slideLot.textContent = `Lot ${record.lot} · ${slideshowIndex + 1}/${slideshowRecords.length}`;
      slideVendor.textContent = record.vendor;
      slideImg.src = lotImage(record.lot);
      slideName.textContent = record.name;
      slidePed.textContent = `${record.sire} – ${record.dam}`;
      slideChoice.textContent = `Choice: ${record.choice.toUpperCase()}`;
      slideP.textContent = `P ${record.physicalScore}`;
      slideG.textContent = `G ${record.pedigreeScore}`;
      slideT.textContent = `T ${record.total}`;

      slidePicBtn.onclick = () => openLightbox(record.lot);
      slidePedBtn.onclick = () => window.open(lotPedigree(record.lot), '_blank');
    }

    function bindActions(){
      document.querySelectorAll('[data-toggle]').forEach(btn => btn.onclick = () => toggleChoice(Number(btn.dataset.toggle)));
      document.querySelectorAll('[data-step]').forEach(btn => btn.onclick = () => stepScore(Number(btn.dataset.lot), btn.dataset.kind, btn.dataset.step)));
      document.querySelectorAll('[data-admin]').forEach(btn => btn.onclick = () => openAdmin(Number(btn.dataset.admin)));
      document.querySelectorAll('[data-photo]').forEach(btn => btn.onclick = () => openLightbox(Number(btn.dataset.photo)));
      document.querySelectorAll('[data-lightbox]').forEach(img => img.onclick = () => openLightbox(Number(img.dataset.lightbox)));
      document.querySelectorAll('[data-pdf]').forEach(btn => btn.onclick = () => window.open(lotPedigree(Number(btn.dataset.pdf)), '_blank'));
      document.querySelectorAll('[data-openlink]').forEach(btn => btn.onclick = () => {
        const e = getEdit(Number(btn.dataset.openlink));
        if (e.secondLink) window.open(e.secondLink, '_blank');
      });
    }

    openFiltersBtn.addEventListener('click', () => filtersDialog.showModal());
    closeFiltersBtn.addEventListener('click', () => filtersDialog.close());
    search.addEventListener('input', render);
    [vendorFilter, choiceFilter, pickedFilter, sortBy, sortDir].forEach(el => el.addEventListener('change', render));

    clearFiltersBtn.addEventListener('click', () => {
      vendorFilter.value='';
      choiceFilter.value='';
      pickedFilter.value='';
      sortBy.value='lot';
      sortDir.value='asc';
      render();
    });

    shortlistBtn.addEventListener('click', () => {
      pickedFilter.value='picked';
      choiceFilter.value='yes';
      sortBy.value='total';
      sortDir.value='desc';
      render();
    });

    allLotsBtn.addEventListener('click', () => {
      search.value='';
      vendorFilter.value='';
      choiceFilter.value='';
      pickedFilter.value='';
      sortBy.value='lot';
      sortDir.value='asc';
      render();
    });

    rankTotalBtn.addEventListener('click', () => { sortBy.value='total'; sortDir.value='desc'; render(); });
    rankPhysicalBtn.addEventListener('click', () => { sortBy.value='physical'; sortDir.value='desc'; render(); });
    rankPedigreeBtn.addEventListener('click', () => { sortBy.value='pedigree'; sortDir.value='desc'; render(); });

    vendorYardBtn.addEventListener('click', () => vendorYardDialog.showModal());
    vendorYardCloseBtn.addEventListener('click', () => vendorYardDialog.close());

    top20Btn.addEventListener('click', openTop20);
    top20CloseBtn.addEventListener('click', () => top20Dialog.close());

    slideshowBtn.addEventListener('click', openSlideshow);
    slideshowCloseBtn.addEventListener('click', () => slideshowDialog.close());
    slidePrevBtn.addEventListener('click', () => { slideshowIndex--; updateSlideshow(); });
    slideNextBtn.addEventListener('click', () => { slideshowIndex++; updateSlideshow(); });

    exportBtn.addEventListener('click', exportData);
    importBtn.addEventListener('click', () => importFile.click());
    importFile.addEventListener('change', e => {
      const file=e.target.files?.[0];
      if (file) importData(file);
      importFile.value='';
    });

    saveBtn.addEventListener('click', saveAdmin);
    cancelBtn.addEventListener('click', () => adminDialog.close());
    deleteEntryBtn.addEventListener('click', clearAdmin);

    lightboxClose.addEventListener('click', () => lightbox.close());

    populateVendorFilter();
    populateVendorYard();
    render();
  </script>
</body>
</html>
